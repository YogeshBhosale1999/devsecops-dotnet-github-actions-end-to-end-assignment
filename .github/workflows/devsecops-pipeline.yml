name: DevSecOps Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # --- Stage 1: Build & Test ---
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.3

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v1.2.0

      - name: Restore NuGet packages
        run: nuget restore SomeConsoleApplication.sln

      - name: Build solution
        run: msbuild SomeConsoleApplication.sln /p:Configuration=Release

      - name: Run unit tests
        run: |
          "C:\Program Files (x86)\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform\vstest.console.exe" ^
          SomeConsoleApplicationTest\bin\Release\SomeConsoleApplicationTest.dll

  # --- Stage 2: Static & Dependency Scans ---
  security-scans:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # SonarCloud Scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=YogeshBhosale1999_devsecops-dotnet-github-actions-end-to-end-assignment
            -Dsonar.organization=yogeshbhosale1999
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Snyk Scan
      - name: Snyk Scan
        uses: snyk/actions/dotnet@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: test

  # --- Stage 3: Dynamic Scan (ZAP) ---
  zap-scan:
    runs-on: ubuntu-latest
    needs: security-scans
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Run OWASP ZAP Baseline Scan
      - name: OWASP ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.6.0
        with:
          target: 'http://localhost:5000'
        continue-on-error: true

      # Upload ZAP Report
      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap_report.html
